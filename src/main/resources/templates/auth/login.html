<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Hotel Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow border-0 rounded-3">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">Đăng nhập</h4>
                </div>
                <div class="card-body p-4">

                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Email hoặc mật khẩu không chính xác!
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success text-center">
                        Bạn đã đăng xuất an toàn.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Đăng nhập</button>
                        </div>
                    </form>

                </div>
                <div class="card-footer text-center py-3 bg-white border-0">
                    <small>Chưa có tài khoản? <a th:href="@{/register}" class="text-decoration-none">Đăng ký ngay</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
