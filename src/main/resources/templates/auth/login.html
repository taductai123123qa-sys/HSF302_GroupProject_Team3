<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Phúc Nguyên Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 15px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.6);
        }

        .hotel-brand {
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .form-subtitle {
            color: #4a5568;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            margin-top: 4px;
            margin-bottom: 35px;
        }

        .form-label {
            font-weight: 700;
            color: #2d3748;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 14px;
            padding: 14px 18px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            color: #1a202c;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .form-control:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.15);
            background-color: #fff;
        }

        .btn-login {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 16px rgba(30, 60, 114, 0.25);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(30, 60, 114, 0.4);
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .link-secondary-custom {
            color: #4a5568;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .link-secondary-custom:hover {
            color: #1e3c72;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="glass-card">
        <div class="mb-2">
            <div class="hotel-brand">Phúc Nguyên Hotel</div>
            <div class="form-subtitle">Hệ thống quản trị cao cấp</div>
        </div>

        <div th:if="${param.error}" class="alert alert-danger text-center rounded-3 border-0 py-2 small fw-bold mb-4 animate__animated animate__fadeIn" role="alert" style="background-color: rgba(248, 215, 218, 0.9); color: #842029;">
            Tài khoản hoặc mật khẩu không đúng!
        </div>
        <div th:if="${param.logout}" class="alert alert-success text-center rounded-3 border-0 py-2 small fw-bold mb-4" role="alert" style="background-color: rgba(209, 231, 221, 0.9); color: #0f5132;">
            Đăng xuất hệ thống thành công.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <input type="text" name="email" class="form-control custom-input" placeholder="Tài khoản Email" required autofocus>
            </div>

            <div class="mb-4">
                <input type="password" name="password" class="form-control custom-input" placeholder="Mật khẩu" required>
            </div>

            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me" style="cursor: pointer;">
                    <label class="form-check-label small text-secondary fw-bold" for="rememberMe" style="cursor: pointer;">Ghi nhớ</label>
                </div>
                <a href="#" class="link-secondary-custom small">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100 text-white mb-4">
                ĐĂNG NHẬP NGAY
            </button>
        </form>

        <style>
            .custom-input {
                height: 60px; /* Chiều cao để nhìn thoáng đãng */
                padding: 0 25px !important;
                border-radius: 16px !important; /* Bo tròn theo đúng ý bạn */
                background: rgba(255, 255, 255, 0.7) !important;
                border: 1px solid rgba(0, 0, 0, 0.05);
                font-weight: 500;
                color: #4a5568;
                transition: all 0.3s ease;
            }

            .custom-input:focus {
                background: rgba(255, 255, 255, 0.9) !important;
                border-color: #2a5298 !important;
                box-shadow: 0 4px 12px rgba(42, 82, 152, 0.1) !important;
            }

            .custom-input::placeholder {
                color: #718096 !important;
                font-weight: 500;
                opacity: 1;
            }
        </style>
    </div>
</div>

</body>
</html>
