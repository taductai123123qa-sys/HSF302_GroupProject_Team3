<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân - Phúc Nguyên Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }
        .profile-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 550px;
            padding: 15px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
        }
        .hotel-brand {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
        }
        .info-group {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .info-label {
            font-weight: 700;
            color: #4a5568;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 1.1rem;
            color: #1a202c;
            font-weight: 600;
        }
        .btn-action {
            border-radius: 14px;
            padding: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .btn-home {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
        }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(30, 60, 114, 0.25); color: white; }
        .btn-logout {
            background: rgba(255, 255, 255, 0.5);
            color: #842029;
            border: 1px solid #842029;
        }
        .btn-logout:hover { background: #842029; color: white; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="glass-card">
        <div class="hotel-brand">Thông tin Hồ sơ</div>

        <div class="info-group">
            <div th:if="${customer != null}">
                <div class="mb-3">
                    <div class="info-label">Họ và tên</div>
                    <div class="info-value" th:text="${customer.fullName}">Nguyễn Văn A</div>
                </div>
                <div class="mb-3">
                    <div class="info-label">Số điện thoại</div>
                    <div class="info-value" th:text="${customer.phone}">0987654321</div>
                </div>
            </div>

            <div>
                <div class="info-label">Tài khoản Email</div>
                <div class="info-value" th:text="${user.email}">email@domain.com</div>
            </div>
            <div class="mt-3">
                <div class="info-label">Quyền hạn</div>
                <div class="info-value">
                    <span class="badge bg-primary" th:text="${user.role}">GUEST</span>
                </div>
            </div>
        </div>

        <div class="d-flex gap-3 mt-4">
            <a th:href="@{/}" class="btn btn-home btn-action w-50 text-center text-decoration-none">VỀ TRANG CHỦ</a>
            <a th:href="@{/logout}" class="btn btn-logout btn-action w-50 text-center text-decoration-none">ĐĂNG XUẤT</a>
        </div>
    </div>
</div>

</body>
</html>
