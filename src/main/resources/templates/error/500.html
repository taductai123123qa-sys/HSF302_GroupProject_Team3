<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>500 - Lỗi hệ thống</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            color: #333;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .error-box {
            width: 520px;
            background: white;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .error-code {
            font-size: 78px;
            font-weight: bold;
            color: #6f42c1;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 26px;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.45;
        }

        .btn {
            display: inline-block;
            padding: 12px 22px;
            background-color: #2c7be5;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin: 5px;
        }

        .btn-back {
            background-color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-box">
        <div class="error-code">500</div>

        <div class="error-title">Lỗi hệ thống</div>

        <div class="error-message">
            Hệ thống đang gặp lỗi trong quá trình xử lý. Bạn sẽ được chuyển về trang chủ trong giây lát...
        </div>

        <div class="error-message" th:if="${message != null}">
            <span th:text="${message}"></span>
        </div>

        <a href="/" class="btn">Về trang chủ</a>
        <a href="javascript:history.back()" class="btn btn-back">Quay lại</a>
    </div>
</div>

<script>
    // Tự động chuyển về trang chủ sau 3 giây
    setTimeout(function () {
        window.location.href = '/';
    }, 3000);
</script>

</body>
</html>
