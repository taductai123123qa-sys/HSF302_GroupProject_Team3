<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>403 - Không có quyền truy cập</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            color: #333;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .error-box {
            width: 520px;
            background: white;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .error-code {
            font-size: 78px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 26px;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.45;
        }

        .btn {
            display: inline-block;
            padding: 12px 22px;
            background-color: #2c7be5;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin: 5px;
        }

        .btn-back {
            background-color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-box">
        <div class="error-code">403</div>

        <div class="error-title">Không có quyền truy cập</div>

        <div class="error-message">
            Tài khoản của bạn không có quyền sử dụng chức năng này.
        </div>

        <a href="/admin/dashboard" class="btn">Về trang quản trị</a>
        <a href="javascript:history.back()" class="btn btn-back">Quay lại</a>
    </div>
</div>

</body>
</html>
