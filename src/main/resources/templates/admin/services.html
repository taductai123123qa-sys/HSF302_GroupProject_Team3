<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý dịch vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }

        .premium-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: none;
            padding: 25px;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            border-bottom: none;
            color: #6c757d;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 15px;
        }

        .table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        .table tbody tr:hover {
            background-color: #f8f9fa;
            transform: translateY(-1px);
        }

        .table tbody td {
            vertical-align: middle;
            border: none;
            padding: 15px 10px;
        }

        .btn {
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{admin/sidebar :: adminSidebar}"></div>

        <div class="container-fluid py-5" style="margin-left: 280px; padding-right: 40px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-dark mb-1">Quản lý dịch vụ</h2>
                    <p class="text-muted">Danh sách dịch vụ đi kèm của khách sạn</p>
                </div>
                <a class="btn btn-primary px-4 py-2 shadow-sm" th:href="@{/admin/services/create}">+ Thêm dịch vụ</a>
            </div>

            <div class="premium-card">
                <table class="table table-hover" th:if="${services != null and !#lists.isEmpty(services)}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên dịch vụ</th>
                            <th>Loại</th>
                            <th>Giá</th>
                            <th>Mô tả</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="service : ${services}">
                            <td class="fw-bold" th:text="${service.id}"></td>
                            <td class="text-dark fw-bold" th:text="${service.name}"></td>
                            <td><span class="badge bg-secondary bg-opacity-75"
                                    th:text="${service.serviceType != null ? service.serviceType : 'OTHER'}"></span>
                            </td>
                            <td class="text-primary fw-bold"
                                th:text="${#numbers.formatDecimal(service.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                            <td th:text="${service.description}"></td>
                            <td>
                                <span class="badge bg-success"
                                    th:if="${service.status != null and service.status.name() == 'ACTIVE'}">ACTIVE</span>
                                <span class="badge bg-danger"
                                    th:if="${service.status != null and service.status.name() != 'ACTIVE'}"
                                    th:text="${service.status}"></span>
                                <span class="badge bg-success" th:if="${service.status == null}">ACTIVE</span>
                            </td>
                            <td>
                                <a class="btn btn-warning btn-sm text-white px-3 me-1"
                                    th:href="@{/admin/services/edit/{id}(id=${service.id})}">Sửa</a>
                                <a class="btn btn-danger btn-sm px-3"
                                    th:href="@{/admin/services/delete/{id}(id=${service.id})}"
                                    onclick="return confirm('Bạn có chắc muốn xóa dịch vụ này không?')">Xóa</a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="text-center py-5 text-muted" th:if="${services == null or #lists.isEmpty(services)}">
                    <i class="fs-4 mb-2 d-block">📦</i>
                    Chưa có dịch vụ nào. Hãy bấm <strong>"+ Thêm dịch vụ"</strong> để tạo mới.
                </div>
            </div>
        </div>
    </div>
</body>

</html>
