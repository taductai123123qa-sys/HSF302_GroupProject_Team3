<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý Khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
        }

        .premium-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: none;
            padding: 25px;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            border-bottom: none;
            color: #6c757d;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 15px;
        }

        .table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        .table tbody tr:hover {
            background-color: #f8f9fa;
            transform: translateY(-1px);
        }

        .table tbody td {
            vertical-align: middle;
            border: none;
            padding: 15px 10px;
        }

        .btn {
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .avatar-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .search-box {
            max-width: 320px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            background: #fff;
        }

        .search-box:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        }
    </style>
</head>

<body class="d-flex">

    <div th:replace="~{admin/sidebar :: adminSidebar}"></div>

    <div class="container-fluid py-5" style="margin-left: 280px; padding-right: 40px; width: 100%;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-1">Quản Lý Khách Hàng</h2>
                <p class="text-muted">Danh sách tài khoản khách hàng (Customer Users) trong hệ thống</p>
            </div>
            <a th:href="@{/admin/users/add}" class="btn btn-primary px-4 py-2 shadow-sm">
                <i class="fas fa-plus me-1"></i> Thêm Khách Hàng
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="premium-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 Tìm theo tên, email, SĐT...">
                <span class="text-muted small">
                    Tổng cộng: <strong th:text="${#lists.size(customers)}">0</strong> khách hàng
                </span>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Khách hàng</th>
                            <th>Email</th>
                            <th>Số điện thoại</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr th:if="${#lists.isEmpty(customers)}">
                            <td colspan="5" class="text-center text-muted py-5">
                                <i class="fas fa-users fa-3x mb-3 d-block" style="opacity: 0.3;"></i>
                                Chưa có khách hàng nào trong hệ thống. Bấm
                                <strong>"+ Thêm Khách Hàng"</strong> để tạo mới.
                            </td>
                        </tr>
                        <tr th:each="c, iter : ${customers}" class="user-row">
                            <td class="text-muted" th:text="${iter.count}">1</td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-circle me-2"
                                         th:text="${c.fullName != null ? #strings.toUpperCase(#strings.substring(c.fullName, 0, 1)) : '?'}">
                                        A
                                    </div>
                                    <div>
                                        <div class="fw-bold text-dark" th:text="${c.fullName}">Tên</div>
                                        <div class="small text-muted">ID: <span th:text="${c.id}"></span></div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <i class="fas fa-envelope text-muted me-1"></i>
                                <span th:text="${c.email}">email</span>
                            </td>
                            <td>
                                <span th:if="${c.phone != null and !#strings.isEmpty(c.phone)}">
                                    <i class="fas fa-phone text-muted me-1"></i>
                                    <span th:text="${c.phone}">0901234567</span>
                                </span>
                                <span th:if="${c.phone == null or #strings.isEmpty(c.phone)}" class="text-muted">
                                    —
                                </span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/admin/users/edit/{id}(id=${c.id})}"
                                   class="btn btn-warning btn-sm text-white px-3 me-1">
                                    <i class="fas fa-edit"></i> Sửa
                                </a>
                                <a th:href="@{/admin/users/delete/{id}(id=${c.id})}"
                                   class="btn btn-danger btn-sm px-3"
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa khách hàng này?');">
                                    <i class="fas fa-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Tìm kiếm nhanh theo tên / email / SĐT (lọc phía client)
        document.getElementById('searchInput').addEventListener('input', function () {
            const keyword = this.value.toLowerCase().trim();
            const rows = document.querySelectorAll('#userTableBody .user-row');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        });
    </script>
</body>

</html>
