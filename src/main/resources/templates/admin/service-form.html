<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Dịch Vụ Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .form-label { font-weight: 600; color: #4a5568; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .custom-input { border-radius: 10px; padding: 12px 16px; border: 1px solid #e2e8f0; background-color: #f8fafc; transition: all 0.2s; }
        .custom-input:focus { background-color: #fff; border-color: #0dcaf0; box-shadow: 0 0 0 4px rgba(13, 202, 240, 0.1); }
        .btn-custom { border-radius: 10px; padding: 12px 24px; font-weight: 600; transition: all 0.3s; }
        .main-content { margin-left: 260px; padding: 2rem; min-height: 100vh; background-color: #f8f9fa; }
    </style>
</head>
<body>

<div th:replace="~{admin/sidebar :: adminSidebar}"></div>

<div class="main-content">
    <div class="container-fluid max-w-7xl">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-0">Thêm Dịch Vụ Mới</h2>
                <p class="text-muted small mt-1">Cấu hình các dịch vụ đi kèm cho khách sạn.</p>
            </div>
        </div>

        <div class="card admin-card mx-auto" style="max-width: 850px;">
            <div class="card-body p-4 p-md-5">
                <form th:action="@{/admin/services/save}" method="post">

                    <div class="mb-4">
                        <label class="form-label">Tên dịch vụ <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control custom-input" placeholder="Ví dụ: Spa Package, Bữa sáng Buffet..." required autofocus>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Loại dịch vụ <span class="text-danger">*</span></label>
                            <select name="type" class="form-select custom-input" required>
                                <option value="" disabled selected>-- Chọn loại dịch vụ --</option>
                                <option value="FOOD">Ẩm thực (F&B)</option>
                                <option value="WELLNESS">Sức khỏe & Làm đẹp</option>
                                <option value="TRANSPORT">Di chuyển</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Trạng thái <span class="text-danger">*</span></label>
                            <select name="status" class="form-select custom-input" required>
                                <option value="ACTIVE" selected>Đang hoạt động</option>
                                <option value="INACTIVE">Ngưng phục vụ</option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Giá dịch vụ (VNĐ) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted border-end-0 rounded-start"><i class="fas fa-tag"></i></span>
                                <input type="number" name="price" class="form-control custom-input border-start-0 ps-0 rounded-start-0" placeholder="Ví dụ: 300000" min="0" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="form-label">Mô tả dịch vụ</label>
                        <textarea name="description" class="form-control custom-input" rows="4" placeholder="Nhập mô tả chi tiết để lễ tân tư vấn cho khách..."></textarea>
                    </div>

                    <hr class="text-muted mb-4">

                    <div class="d-flex justify-content-end gap-3">
                        <a th:href="@{/admin/services}" class="btn btn-light btn-custom text-secondary border">Hủy thao tác</a>
                        <button type="submit" class="btn btn-info text-white btn-custom shadow-sm"><i class="fas fa-save me-2"></i> Lưu Dịch Vụ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
