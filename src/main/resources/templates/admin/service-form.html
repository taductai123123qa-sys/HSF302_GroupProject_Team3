<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; }
        .content { flex: 1; padding: 30px; margin-left: 280px; width: 100%; }
        .premium-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); max-width: 800px; border: none; }
    </style>
</head>
<body class="d-flex">

<div th:replace="~{admin/sidebar :: adminSidebar}"></div>

<div class="content container-fluid py-4">
    <h2 class="fw-bold text-dark mb-1" th:text="${hotelService != null and hotelService.id != null ? 'Cập nhật dịch vụ' : 'Thêm dịch vụ mới'}">Thêm dịch vụ mới</h2>
    <p class="text-muted mb-4">Nhập thông tin dịch vụ đi kèm.</p>

    <div class="premium-card">
        <form th:action="@{/admin/services/save}" th:object="${hotelService}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label fw-bold">Tên dịch vụ</label>
                <input type="text" class="form-control" th:field="*{name}" placeholder="Ví dụ: Spa Package" required>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Loại dịch vụ</label>
                    <select class="form-select" th:field="*{serviceType}">
                        <option value="">-- Chọn loại dịch vụ --</option>
                        <option th:each="type : ${serviceTypes}" th:value="${type}" th:text="${type}">SPA</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Trạng thái</label>
                    <select class="form-select" th:field="*{status}">
                        <option value="">-- Chọn trạng thái --</option>
                        <option th:each="st : ${serviceStatuses}" th:value="${st}" th:text="${st}">ACTIVE</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Giá (VNĐ)</label>
                <input type="number" class="form-control" step="1000" min="0" th:field="*{price}" placeholder="Ví dụ: 300000" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Mô tả</label>
                <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Nhập mô tả dịch vụ"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-5">Lưu</button>
                <a href="/admin/services" class="btn btn-secondary px-4">Hủy</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
