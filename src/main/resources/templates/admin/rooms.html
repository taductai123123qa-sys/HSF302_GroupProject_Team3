<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý phòng</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 230px;
            background: #1f3b64;
            color: white;
            padding: 24px 18px;
        }

        .sidebar h2 {
            font-size: 20px;
            margin-bottom: 28px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 14px;
            margin-bottom: 8px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #2c5288;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        h1 {
            color: #1f3b64;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background: #1f3b64;
            color: white;
        }

        .btn {
            display: inline-block;
            padding: 9px 14px;
            border-radius: 7px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-primary {
            background: #2c7be5;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #222;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-small {
            padding: 6px 10px;
            font-size: 13px;
        }

        .badge {
            display: inline-block;
            padding: 5px 9px;
            border-radius: 20px;
            background: #e9ecef;
            font-size: 12px;
        }

        .empty {
            padding: 25px;
            text-align: center;
            color: #777;
            background: white;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <h2>Hotel Admin</h2>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/rooms">Quản lý phòng</a>
        <a href="/admin/services">Quản lý dịch vụ</a>
        <a href="/admin/statistics">Thống kê</a>
    </div>

    <div class="content">
        <div class="page-header">
            <div>
                <h1>Quản lý phòng</h1>
                <p>Danh sách phòng cụ thể trong khách sạn.</p>
            </div>

            <a class="btn btn-primary" href="/admin/rooms/create">+ Thêm phòng</a>
        </div>

        <table th:if="${rooms != null and !#lists.isEmpty(rooms)}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Số phòng</th>
                <th>Tầng</th>
                <th>Hạng phòng</th>
                <th>Sức chứa</th>
                <th>Giá/đêm</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="room : ${rooms}">
                <td th:text="${room.id}">1</td>
                <td th:text="${room.roomNumber}">101</td>
                <td th:text="${room.floor}">1</td>
                <td th:text="${room.roomCategory != null ? room.roomCategory.name : 'Chưa có'}">Standard</td>
                <td th:text="${room.roomCategory != null ? room.roomCategory.capacity : 0}">2</td>
                <td th:text="${room.roomCategory != null ? room.roomCategory.pricePerNight : 0}">500000</td>
                <td>
                    <span class="badge" th:text="${room.roomStatus}">AVAILABLE</span>
                </td>
                <td>
                    <a class="btn btn-warning btn-small"
                       th:href="@{/admin/rooms/edit/{id}(id=${room.id})}">
                        Sửa
                    </a>

                    <a class="btn btn-danger btn-small"
                       th:href="@{/admin/rooms/delete/{id}(id=${room.id})}"
                       onclick="return confirm('Bạn có chắc muốn xóa phòng này không?')">
                        Xóa
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${rooms == null or #lists.isEmpty(rooms)}">
            Chưa có phòng nào. Hãy bấm “Thêm phòng” để tạo phòng mới.
        </div>
    </div>
</div>

</body>
</html>
