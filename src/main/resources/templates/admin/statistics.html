<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thống kê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; }
        .content { flex: 1; padding: 30px; margin-left: 280px; width: 100%; }
        .stat-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: none; padding: 25px; transition: transform 0.3s; height: 100%;}
        .stat-card:hover { transform: translateY(-5px); }
        .stat-title { color: #6c757d; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body class="d-flex">

<div th:replace="~{admin/sidebar :: adminSidebar}"></div>

<div class="content container-fluid py-4">
    <div class="mb-4">
        <h2 class="fw-bold text-dark mb-1">Thống kê & Báo cáo</h2>
        <p class="text-muted">Biểu đồ doanh thu và tỷ lệ lấp đầy theo hạng phòng.</p>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-title">Tổng số phòng</div>
                <div class="stat-value" th:text="${totalRooms != null ? totalRooms : 15}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-title">Phòng trống</div>
                <div class="stat-value text-success" th:text="${availableRooms != null ? availableRooms : 8}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-title">Đang sử dụng</div>
                <div class="stat-value text-warning" th:text="${occupiedRooms != null ? occupiedRooms : 7}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-title">Tổng Doanh Thu</div>
                <div class="stat-value text-primary fs-3 mt-2" th:text="${totalRevenue != null ? #numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT') + ' ₫' : '24,500,000 ₫'}">0 ₫</div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="stat-card">
                <h5 class="fw-bold text-dark mb-4">Doanh thu theo Hạng phòng</h5>
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="stat-card">
                <h5 class="fw-bold text-dark mb-4">Tỷ lệ lấp đầy (%)</h5>
                <canvas id="occupancyChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    var labels = /*[[${categoryLabels}]]*/ ['Standard', 'Deluxe', 'Suite', 'VIP'];
    var revenues = /*[[${categoryRevenue}]]*/ [5000000, 8500000, 12000000, 4000000];
    var occupancies = /*[[${occupancyRates}]]*/ [65, 80, 45, 90];

    const ctxRev = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctxRev, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Doanh thu (VNĐ)',
                data: revenues,
                backgroundColor: 'rgba(13, 110, 253, 0.7)',
                borderColor: 'rgba(13, 110, 253, 1)',
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    const ctxOcc = document.getElementById('occupancyChart').getContext('2d');
    new Chart(ctxOcc, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                label: 'Số lượng/Tỷ lệ',
                data: occupancies,
                backgroundColor: ['#198754', '#ffc107', '#dc3545', '#0dcaf0'],
                borderWidth: 0
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
</script>
</body>
</html>
