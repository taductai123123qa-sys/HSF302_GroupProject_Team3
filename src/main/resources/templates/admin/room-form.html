<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .card { border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05) !important; }
        .card-header { border-radius: 16px 16px 0 0 !important; background: linear-gradient(135deg, #4e73df, #224abe) !important; border-bottom: none; }
        .form-control, .form-select { border-radius: 8px; padding: 12px 15px; border: 1px solid #e3e6f0; transition: all 0.2s; background-color: #f8f9fc;}
        .form-control:focus, .form-select:focus { border-color: #4e73df; box-shadow: 0 0 0 0.25rem rgba(78, 115, 223, 0.15); background-color: #fff;}
        .btn { border-radius: 8px; padding: 10px 24px; font-weight: 600; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center py-3">
                    <h4 class="mb-0" th:text="${room.id == null} ? 'Thêm Phòng mới' : 'Cập nhật Phòng'">Phòng</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/rooms/save}" th:object="${room}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Số phòng</label>
                            <input type="text" class="form-control" th:field="*{roomNumber}" required placeholder="VD: 101, 202...">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Thuộc Hạng phòng</label>
                            <select class="form-select" th:field="*{roomCategory}" required>
                                <option value="">-- Chọn hạng phòng --</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Trạng thái ban đầu</label>
                            <select class="form-select" th:field="*{roomStatus}" required>
                                <option value="AVAILABLE">Còn trống (AVAILABLE)</option>
                                <option value="OCCUPIED">Đang có khách (OCCUPIED)</option>
                                <option value="MAINTENANCE">Đang bảo trì (MAINTENANCE)</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/rooms}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success px-5">Lưu phòng</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
