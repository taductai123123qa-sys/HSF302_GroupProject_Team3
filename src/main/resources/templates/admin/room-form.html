<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; }
        .content { flex: 1; padding: 30px; margin-left: 280px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); max-width: 800px; border: none; }
    </style>
</head>
<body class="d-flex">

<div th:replace="~{admin/sidebar :: adminSidebar}"></div>

<div class="content container-fluid py-4">
    <h2 class="fw-bold text-dark mb-1" th:text="${room != null and room.id != null ? 'Cập nhật phòng' : 'Thêm phòng mới'}">Thêm phòng mới</h2>
    <p class="text-muted mb-4">Nhập thông tin phòng cụ thể.</p>

    <div class="card">
        <form th:action="@{/admin/rooms/save}" th:object="${room}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Số phòng</label>
                    <input type="text" class="form-control" th:field="*{roomNumber}" placeholder="Ví dụ: 101" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Tầng</label>
                    <input type="number" class="form-control" th:field="*{floor}" min="1" placeholder="Ví dụ: 1" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Hạng phòng</label>
                <select class="form-select" th:field="*{roomCategory.id}" required>
                    <option value="">-- Chọn hạng phòng --</option>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">Standard</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Trạng thái phòng</label>
                <select class="form-select" th:field="*{roomStatus}" required>
                    <option value="">-- Chọn trạng thái --</option>
                    <option th:each="status : ${roomStatuses}" th:value="${status}" th:text="${status}">AVAILABLE</option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">Lưu</button>
                <a href="/admin/rooms" class="btn btn-secondary px-4">Hủy</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
