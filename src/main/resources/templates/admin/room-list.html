<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; }

        /* Box cao cấp */
        .premium-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: none; padding: 25px; }
        .table { margin-bottom: 0; }
        .table thead th { border-bottom: none; color: #6c757d; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; padding-bottom: 15px; }
        .table tbody tr { border-bottom: 1px solid #f0f0f0; transition: all 0.2s; }
        .table tbody tr:hover { background-color: #f8f9fa; transform: translateY(-1px); }
        .table tbody td { vertical-align: middle; border: none; padding: 15px 10px; }

        /* Hiệu ứng Nút và Nhãn dán Soft-UI */
        .btn { border-radius: 8px; font-weight: 500; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .badge-custom { padding: 8px 12px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.3px; display: inline-block;}
        .bg-soft-success { background-color: #d1e7dd; color: #0f5132; }
        .bg-soft-danger { background-color: #f8d7da; color: #842029; }
        .bg-soft-warning { background-color: #fff3cd; color: #664d03; }
    </style>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{admin/sidebar :: adminSidebar}"></div>

    <div class="container-fluid py-5" style="margin-left: 280px; padding-right: 40px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-1">Quản Lý Phòng</h2>
                <p class="text-muted">Danh sách các phòng vật lý và trạng thái hiện tại</p>
            </div>
            <a th:href="@{/admin/rooms/add}" class="btn btn-primary px-4 py-2 shadow-sm">+ Thêm Phòng mới</a>
        </div>

        <div class="premium-card">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Số Phòng</th>
                    <th>Hạng Phòng</th>
                    <th>Trạng Thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${rooms}">
                    <td class="fw-bold fs-5 text-dark" th:text="${r.roomNumber}"></td>
                    <td class="fw-medium text-secondary" th:text="${r.roomCategory.name}"></td>
                    <td>
                        <span th:if="${r.roomStatus.name() == 'AVAILABLE'}" class="badge-custom bg-soft-success">● Còn trống</span>
                        <span th:if="${r.roomStatus.name() == 'OCCUPIED'}" class="badge-custom bg-soft-danger">● Có khách</span>
                        <span th:if="${r.roomStatus.name() == 'MAINTENANCE'}" class="badge-custom bg-soft-warning">● Bảo trì</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/rooms/edit/{id}(id=${r.id})}" class="btn btn-warning btn-sm text-white px-3 me-1">Sửa</a>
                        <a th:href="@{/admin/rooms/delete/{id}(id=${r.id})}" class="btn btn-danger btn-sm px-3" onclick="return confirm('Bạn có chắc chắn muốn xóa phòng này?')">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
