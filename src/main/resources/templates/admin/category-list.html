<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Danh sách Hạng phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }

        .premium-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: none;
            padding: 25px;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            border-bottom: none;
            color: #6c757d;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 15px;
        }

        .table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        .table tbody tr:hover {
            background-color: #f8f9fa;
            transform: translateY(-1px);
        }

        .table tbody td {
            vertical-align: middle;
            border: none;
            padding: 15px 10px;
        }

        .img-thumbnail {
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .btn {
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="d-flex">
        <div th:replace="~{admin/sidebar :: adminSidebar}"></div>

        <div class="container-fluid py-5" style="margin-left: 280px; padding-right: 40px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-dark mb-1">Hạng Phòng</h2>
                    <p class="text-muted">Quản lý các loại phòng của khách sạn</p>
                </div>
                <a th:href="@{/admin/categories/add}" class="btn btn-primary px-4 py-2 shadow-sm">+ Thêm Hạng mới</a>
            </div>

            <div class="premium-card">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Hình ảnh</th>
                            <th>Tên Hạng</th>
                            <th>Giá/Đêm</th>
                            <th>Sức chứa</th>
                            <th>Diện tích</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td>
                                <img th:if="${cat.imgUrl != null}" th:src="${cat.imgUrl}" alt="Room"
                                    class="img-thumbnail" style="width: 85px; height: 60px; object-fit: cover;">
                                <span th:if="${cat.imgUrl == null}" class="badge bg-light text-dark border">No
                                    Image</span>
                            </td>
                            <td class="fw-bold text-dark" th:text="${cat.name}"></td>
                            <td class="text-primary fw-bold"
                                th:text="${#numbers.formatDecimal(cat.pricePerNight, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            </td>
                            <td><span class="badge bg-info text-dark bg-opacity-25 px-2 py-1"
                                    th:text="${cat.capacity} + ' người'"></span></td>
                            <td th:text="${cat.size} + ' m²'"></td>
                            <td>
                                <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                    class="btn btn-warning btn-sm text-white px-3 me-1">Sửa</a>
                                <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                    class="btn btn-danger btn-sm px-3"
                                    onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
