<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Hạng phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .card { border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05) !important; }
        .card-header { border-radius: 16px 16px 0 0 !important; background: linear-gradient(135deg, #4e73df, #224abe) !important; border-bottom: none; }
        .form-control, .form-select { border-radius: 8px; padding: 12px 15px; border: 1px solid #e3e6f0; transition: all 0.2s; background-color: #f8f9fc;}
        .form-control:focus, .form-select:focus { border-color: #4e73df; box-shadow: 0 0 0 0.25rem rgba(78, 115, 223, 0.15); background-color: #fff;}
        .btn { border-radius: 8px; padding: 10px 24px; font-weight: 600; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light d-flex" style="min-height: 100vh;">

<div th:replace="~{admin/sidebar :: adminSidebar}"></div>

<div class="container-fluid py-5 w-100">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0" th:text="${category.id == null} ? 'Thêm Hạng phòng mới' : 'Cập nhật Hạng phòng'">Hạng phòng</h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/admin/categories/save}" th:object="${category}" method="post" enctype="multipart/form-data">

                        <input type="hidden" th:field="*{id}">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tên hạng phòng</label>
                                <input type="text" class="form-control" th:field="*{name}" required placeholder="VD: Standard Room">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Giá mỗi đêm (VNĐ)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{pricePerNight}" required placeholder="VD: 1000000">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Sức chứa (Người)</label>
                                <input type="number" class="form-control" th:field="*{capacity}" required placeholder="VD: 2">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Diện tích (m²)</label>
                                <input type="number" step="0.1" class="form-control" th:field="*{size}" placeholder="VD: 25.5">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả chi tiết</label>
                            <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Nhập mô tả về hạng phòng..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-primary">Hình ảnh hạng phòng</label>
                            <input type="file" name="images" class="form-control" accept="image/*">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/categories}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-success px-5">Lưu thông tin</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
