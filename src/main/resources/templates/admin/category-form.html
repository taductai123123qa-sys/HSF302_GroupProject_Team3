<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm Hạng Phòng Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .form-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .custom-input {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        .custom-input:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-custom {
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .img-preview {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 10px;
            display: none;
            border: 2px dashed #cbd5e1;
        }

        .main-content {
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

    <div th:replace="~{admin/sidebar :: adminSidebar}"></div>

    <div class="main-content">
        <div class="container-fluid max-w-7xl">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-dark mb-0" th:text="${category.id == null ? 'Thêm Hạng Phòng Mới' : 'Chỉnh Sửa Hạng Phòng'}">Thêm Hạng Phòng Mới</h2>
                    <p class="text-muted small mt-1">Nhập thông tin chi tiết và hình ảnh cho hạng phòng.</p>
                </div>
                <a th:href="@{/admin/categories}" class="btn btn-light btn-custom text-secondary border shadow-sm"><i
                        class="fas fa-arrow-left me-2"></i> Quay lại</a>
            </div>

            <div class="card admin-card">
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/admin/categories/save}" method="post" enctype="multipart/form-data"
                        th:object="${category}">
                        <input type="hidden" th:field="*{id}" />
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Tên hạng phòng <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{name}" class="form-control custom-input"
                                    placeholder="VD: Standard Room, Deluxe..." required autofocus>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Giá mỗi đêm <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" th:field="*{pricePerNight}"
                                        class="form-control custom-input rounded-end-0" placeholder="VD: 1000000"
                                        min="0" required>
                                    <span
                                        class="input-group-text bg-light border-start-0 text-muted rounded-end">VNĐ</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Sức chứa <span class="text-danger">*</span></label>
                                <input type="number" th:field="*{capacity}" class="form-control custom-input"
                                    placeholder="VD: 2" min="1" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Diện tích <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" th:field="*{size}"
                                        class="form-control custom-input rounded-end-0" step="0.1"
                                        placeholder="VD: 25.5" min="1" required>
                                    <span
                                        class="input-group-text bg-light border-start-0 text-muted rounded-end">m²</span>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Mô tả chi tiết</label>
                            <textarea th:field="*{description}" class="form-control custom-input" rows="4"
                                placeholder="Nhập những điểm nổi bật của hạng phòng này..."></textarea>
                        </div>

                        <div class="mb-5">
                            <label class="form-label">Hình ảnh đại diện</label>
                            <input type="file" name="imageFile" class="form-control custom-input mb-3" id="imageInput"
                                accept="image/*">
                            <!-- Preview ảnh MỚI được chọn -->
                            <img id="preview" src="#" alt="Xem trước hình ảnh" class="img-preview shadow-sm mt-2">
                            <!-- Hiển thị ảnh HIỆN TẠI (nếu đang edit) -->
                            <div th:if="${category.imgUrl != null and !#strings.isEmpty(category.imgUrl)}" class="mt-3">
                                <label class="form-label small text-muted">Ảnh hiện tại:</label>
                                <div class="border rounded p-2 bg-light text-center">
                                    <img th:src="@{${category.imgUrl}}" alt="Ảnh hiện tại"
                                         style="max-width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px;">
                                </div>
                                <small class="text-muted d-block mt-2">
                                    <i class="fas fa-info-circle me-1"></i>
                                    Chọn file mới ở trên để thay thế ảnh hiện tại.
                                </small>
                            </div>
                        </div>

                        <hr class="text-muted mb-4">

                        <div class="d-flex justify-content-end gap-3">
                            <button type="reset" class="btn btn-light btn-custom text-secondary border">Xóa
                                form</button>
                            <button type="submit" class="btn btn-success btn-custom shadow-sm"><i
                                    class="fas fa-save me-2"></i> Lưu Thông Tin</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');

        imageInput.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.addEventListener('load', function () {
                    preview.src = this.result;
                    preview.style.display = 'block';
                });
                reader.readAsDataURL(file);
            } else {
                preview.style.display = 'none';
                preview.src = "";
            }
        });
    </script>
</body>

</html>
