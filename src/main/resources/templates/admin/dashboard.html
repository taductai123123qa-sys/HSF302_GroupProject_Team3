<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Thống Kê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; }
        .premium-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: none; padding: 25px; transition: transform 0.3s ease; }
        .premium-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .card-title { color: #2c3e50; font-weight: 700; font-size: 1.1rem; letter-spacing: 0.3px; }
    </style>
</head>
<body>
<div class="d-flex">
    <div th:replace="~{admin/sidebar :: adminSidebar}"></div>

    <div class="container-fluid py-5" style="margin-left: 280px; padding-right: 40px;">
        <div class="mb-5">
            <h2 class="fw-bold text-dark mb-1">Dashboard Tổng Quan</h2>
            <p class="text-muted">Báo cáo doanh thu và tình trạng lấp đầy phòng</p>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="premium-card h-100 d-flex flex-column">
                    <h5 class="card-title mb-4">💰 Doanh thu theo Hạng phòng</h5>
                    <div class="flex-grow-1 d-flex justify-content-center align-items-center">
                        <div style="width: 75%;">
                            <canvas id="revenueChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="premium-card h-100 d-flex flex-column">
                    <h5 class="card-title mb-4">📈 Số lượt đặt phòng</h5>
                    <div class="flex-grow-1">
                        <canvas id="occupancyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const labels = /*[[${categoryLabels}]]*/ ['Chưa có dữ liệu'];
    const revenueData = /*[[${categoryRevenue}]]*/ [0];
    const occupancyData = /*[[${occupancyRates}]]*/ [0];

    // Set font chung cho Chart.js
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.color = '#858796';

    // Biểu đồ Vòng (Doughnut)
    new Chart(document.getElementById('revenueChart').getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: revenueData,
                backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b'],
                borderWidth: 0,
                hoverOffset: 8
            }]
        },
        options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
    });

    // Biểu đồ Cột bo góc
    new Chart(document.getElementById('occupancyChart').getContext('2d'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Lượt đặt',
                data: occupancyData,
                backgroundColor: '#4e73df',
                borderRadius: 6, // Bo góc cột
                barThickness: 40 // Độ rộng cột
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { borderDash: [5, 5], color: '#eaecf4' }, border: { display: false } },
                x: { grid: { display: false }, border: { display: false } }
            }
        }
    });
</script>
</body>
</html>
