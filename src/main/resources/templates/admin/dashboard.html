<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
        }

        .content {
            flex: 1;
            padding: 30px;
            margin-left: 280px;
            width: 100%;
        }

        h1 {
            color: #1f3b64;
            font-weight: bold;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
            height: 100%;
        }

        .stat-card h3 {
            margin-top: 0;
            color: #6c757d;
            font-size: 1.1rem;
        }

        .number {
            font-size: 32px;
            font-weight: bold;
            color: #0d6efd;
        }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }
    </style>
</head>

<body class="d-flex">

    <div th:replace="~{admin/sidebar :: adminSidebar}"></div>

    <div class="content container-fluid">
        <h1 class="mb-2">Admin Dashboard</h1>
        <p class="text-muted mb-4">Trang quản lý hệ thống khách sạn.</p>

        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="stat-card">
                    <h3>Tổng phòng</h3>
                    <div class="number" th:text="${totalRooms}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h3>Phòng trống</h3>
                    <div class="number text-success" th:text="${availableRooms}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h3>Dịch vụ</h3>
                    <div class="number text-warning" th:text="${totalServices}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h3>Doanh thu</h3>
                    <div class="number text-primary fs-3" th:text="${totalRevenue} + ' ₫'">0 ₫</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="stat-card">
                    <h5 class="fw-bold text-dark mb-4">Doanh thu theo Hạng phòng</h5>
                    <div class="chart-container">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stat-card">
                    <h5 class="fw-bold text-dark mb-4">Tỷ lệ lấp đầy (%)</h5>
                    <div class="chart-container">
                        <canvas id="occupancyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        var labels = /*[[${categoryLabels}]]*/[];
        var revenues = /*[[${categoryRevenue}]]*/[];
        var occupancies = /*[[${occupancyRates}]]*/[];

        const ctxRev = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctxRev, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Doanh thu (VNĐ)',
                    data: revenues,
                    backgroundColor: 'rgba(13, 110, 253, 0.7)',
                    borderColor: 'rgba(13, 110, 253, 1)',
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const ctxOcc = document.getElementById('occupancyChart').getContext('2d');
        new Chart(ctxOcc, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Tỷ lệ lấp đầy (%)',
                    data: occupancies,
                    backgroundColor: ['#198754', '#ffc107', '#dc3545', '#0dcaf0'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
        /*]]>*/
    </script>

</body>

</html>
