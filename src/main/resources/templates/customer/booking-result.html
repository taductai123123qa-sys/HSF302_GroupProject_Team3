<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/fragments :: html_head('Kết quả đặt phòng - Phúc Nguyên Hotel')}">
    <meta charset="UTF-8">
    <title>Kết quả đặt phòng</title>
</head>

<body class="bg-light">

    <!-- Header -->
    <header th:replace="~{layout/fragments :: customer_header}"></header>

    <div class="container mt-5 pt-5 mb-5 text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-lg p-4">

                    <!-- Trạng thái Thành Công -->
                    <div th:if="${status == 'success'}" class="text-success mb-4">
                        <i class="fas fa-check-circle fa-5x"></i>
                        <h2 class="mt-3 fw-bold">Đã Đặt Phòng Thành Công!</h2>
                        <p class="fs-5 mt-2">Cảm ơn quý khách đã tin tưởng và lựa chọn Phúc Nguyên Hotel.</p>
                    </div>

                    <!-- Trạng thái Thất Bại -->
                    <div th:if="${status == 'error'}" class="text-danger mb-4">
                        <i class="fas fa-times-circle fa-5x"></i>
                        <h2 class="mt-3 fw-bold">Thanh Toán Thất Bại</h2>
                        <p class="fs-5 mt-2">Đơn đặt phòng chưa hoàn tất. Vui lòng thử lại.</p>
                    </div>

                    <!-- Lời nhắn từ hệ thống -->
                    <p class="fs-5 text-muted mb-4" th:text="${message}"></p>

                    <!-- Khung thông tin giao dịch -->
                    <div class="bg-light border rounded p-3 mb-4 text-start mx-auto" style="max-width: 400px;">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Mã Đơn Đặt (TxnRef)</span>
                            <strong th:text="${txnRef != null ? txnRef : 'N/A'}"></strong>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted">Mã GD Cổng VNPay</span>
                            <strong th:text="${transactionNo != null ? transactionNo : 'N/A'}"></strong>
                        </div>
                    </div>

                    <div class="d-flex gap-3 justify-content-center mt-3">
                        <a href="/customer/booking/history" class="btn btn-outline-primary px-4 py-2 fw-bold">Xem Lịch Sử Đặt Phòng</a>
                        <a href="/" class="btn btn-primary px-4 py-2 fw-bold">Về Trang Chủ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer th:replace="~{layout/fragments :: customer_footer}"></footer>

    <!-- Scripts -->
    <div th:replace="~{layout/fragments :: html_scripts}"></div>
</body>
</html>
