<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn phương thức thanh toán</title>
    <!-- Nhúng Bootstrap 5 qua CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .payment-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="payment-box">
                <h3 class="text-center text-primary mb-4">Xác Nhận Thanh Toán</h3>

                <!-- Tóm tắt đơn hàng -->
                <div class="mb-4 p-3 border rounded bg-white">
                    <h5>Tóm tắt đặt phòng</h5>
                    <p><strong>Loại phòng:</strong> <span th:text="${category.name}"></span></p>
                    <p><strong>Ngày Check-in:</strong> <span th:text="${bookingRequest.checkInDate}"></span></p>
                    <p><strong>Ngày Check-out:</strong> <span th:text="${bookingRequest.checkOutDate}"></span></p>
                    <p><strong>Số đêm:</strong> <span th:text="${nights}"></span> đêm</p>
                    <p><strong>Số lượng phòng:</strong> <span th:text="${bookingRequest.roomCount}"></span> phòng</p>
                    <p><strong>Tổng tiền phòng:</strong> 
                        <span th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                    </p>
                </div>

                <!-- Form đẩy dữ liệu tiếp theo để tạo đơn và thanh toán -->
                <form th:action="@{/bookings/process-vnpay}" method="post">
                    
                    <!-- Các trường dữ liệu ẩn (Hidden) giữ lại thông tin người dùng nhập từ trang trước -->
                    <input type="hidden" name="categoryId" th:value="${bookingRequest.categoryId}">
                    <input type="hidden" name="checkInDate" th:value="${bookingRequest.checkInDate}">
                    <input type="hidden" name="checkOutDate" th:value="${bookingRequest.checkOutDate}">
                    <input type="hidden" name="guestCount" th:value="${bookingRequest.guestCount}">
                    <input type="hidden" name="roomCount" th:value="${bookingRequest.roomCount}">
                    <input type="hidden" name="fullName" th:value="${bookingRequest.fullName}">
                    <input type="hidden" name="phone" th:value="${bookingRequest.phone}">
                    <input type="hidden" name="idCard" th:value="${bookingRequest.idCard}">
                    <input type="hidden" name="notes" th:value="${bookingRequest.notes}">
                    
                    <!-- Truyền theo tổng giá -->
                    <input type="hidden" name="totalPrice" th:value="${totalPrice}">

                    <!-- Chọn mức cọc -->
                    <h5 class="mb-3">Chọn mức thanh toán cọc:</h5>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="depositRate" id="deposit50" 
                               value="50" checked onchange="updateTotal()">
                        <label class="form-check-label" for="deposit50">
                            Cọc trước 50% (<span th:text="${#numbers.formatDecimal(totalPrice.multiply(T(java.math.BigDecimal).valueOf(0.5)), 0, 'COMMA', 0, 'POINT')}"></span> VNĐ)
                        </label>
                    </div>
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="radio" name="depositRate" id="deposit100" 
                               value="100" onchange="updateTotal()">
                        <label class="form-check-label" for="deposit100">
                            Thanh toán toàn bộ 100% (<span th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ)
                        </label>
                    </div>

                    <!-- Hiển thị tổng tiền cần thanh toán ngay lúc này -->
                    <div class="alert alert-info">
                        <strong>Số tiền cần thanh toán ngay: </strong>
                        <span id="finalPaymentText" class="text-danger fw-bold fs-5">
                            <span th:text="${#numbers.formatDecimal(totalPrice.multiply(T(java.math.BigDecimal).valueOf(0.5)), 0, 'COMMA', 0, 'POINT')}"></span>
                        </span> VNĐ
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fs-5 mt-3">
                        💳 Thanh toán qua VNPAY
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Script xử lý thay đổi số tiền thời gian thực -->
<script th:inline="javascript">
    function updateTotal() {
        // Lấy radio button đang được chọn
        var selectedRadio = document.querySelector('input[name="depositRate"]:checked');
        if (selectedRadio) {
            // Lấy phần trăm cọc (50 hoặc 100)
            var rate = parseInt(selectedRadio.value);
            
            // Lấy tổng tiền từ Thymeleaf truyền xuống cho JS (tránh lỗi parse)
            var totalPrice = /*[[${totalPrice}]]*/ 0;
            
            // Tính số tiền cần trả
            var amount = (totalPrice * rate) / 100;
            
            // Format số sang dạng chuỗi có phân cách hàng nghìn (VD: 10.000.000)
            var formattedAmount = new Intl.NumberFormat('vi-VN').format(amount);
            
            // Cập nhật lên giao diện
            document.getElementById('finalPaymentText').innerText = formattedAmount;
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
